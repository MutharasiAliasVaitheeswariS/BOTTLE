<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nysense XR Experience</title>

    <script src="https://aframe.io/releases/1.7.1/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>

    <style>
        body { margin: 0; overflow: hidden; }
    </style>
</head>

<body>

    <!-- 
        FIX 1: Added raycaster="objects: .clickable" 
        This ensures mouse/touch events only check for objects with class "clickable"
    -->
    <a-scene 
        embedded 
        arjs="sourceType:webcam; detectionMode: mono_and_matrix; matrixCodeType: 3x3;"
        cursor="rayOrigin: mouse" 
        raycaster="objects: .clickable">

        <a-marker type="pattern" url="./pattern-Nysense.patt" id="marker">

            <!-- 3D Bottle -->
            <a-gltf-model
                id="bottle"
                src="./Bottle.gltf"
                scale="0 0 0"
                position="0 0 0"
                rotation="0 0 0">
            </a-gltf-model>

            <!-- Feature Text -->
            <a-text id="featureText"
                value=""
                position="-2 3 0"
                rotation="0 0 0"
                width="6"
                color="#00f2ff"
                opacity="0">
            </a-text>

            <!-- HOTSPOT (Hidden Initially) -->
            <a-entity id="hotspotContainer" visible="false" position="1 2 0">

                <!-- Pulsing Ring -->
                <a-ring
                    radius-inner="0.15"
                    radius-outer="0.25"
                    color="#5920db"
                    rotation="-90 0 0"
                    animation="property: scale;
                               to: 1.4 1.4 1.4;
                               dir: alternate;
                               dur: 1000;
                               loop: true">
                </a-ring>

                <!-- Clickable Center -->
                <!-- FIX 2: Increased radius slightly for easier tapping -->
                <a-circle
                    id="ctaHotspot"
                    radius="0.2"
                    color="#ffffff"
                    rotation="-90 0 0"
                    class="clickable">
                </a-circle>

                <!-- Label -->
                <a-text
                    value="Tap to Pre-Order"
                    position="-1 0.6 0"
                    rotation="0 0 0"
                    width="4"
                    color="#00f2ff">
                </a-text>

            </a-entity>

        </a-marker>

        <!-- FIX 3: Removed <a-cursor> as it conflicts with rayOrigin: mouse -->
        <a-entity camera></a-entity>

    </a-scene>

    <script>
        let features = [
            "NYSENSE",
            "🔬 Real-Time Water Intelligence",
            "🧠 AI-Powered Mineral Insights",
            "💡 UV-C Self Sterilization",
            "🌡 Adaptive Temperature Mode",
            "♻ Sustainable Smart Design"
        ];

        let index = 0;
        let started = false;

        window.addEventListener("DOMContentLoaded", () => {

            const marker = document.querySelector("#marker");
            const bottle = document.querySelector("#bottle");
            const text = document.querySelector("#featureText");
            const hotspotContainer = document.querySelector("#hotspotContainer");
            const hotspot = document.querySelector("#ctaHotspot");

            // Marker Found Event
            marker.addEventListener("markerFound", () => {

                if(started) return;
                started = true;

                console.log("Marker Found! Starting animation...");

                // Bottle Pop Entry
                bottle.setAttribute("animation__scale",
                    "property: scale; from: 0 0 0; to: 5 5 5; dur: 1200; easing: easeOutElastic");

                bottle.setAttribute("animation__rotate",
                    "property: rotation; from: 0 720 0; to: 0 0 0; dur: 2000; easing: easeOutCubic");

                setTimeout(() => {

                    bottle.setAttribute("animation__idle",
                        "property: rotation; to: 0 360 0; dur: 15000; loop: true; easing: linear");

                    showNextFeature();

                }, 2200);
            });

            function showNextFeature(){

                if(index >= features.length){
                    // Show the hotspot button after all features are shown
                    hotspotContainer.setAttribute("visible", true);
                    console.log("Showing Hotspot");
                    return;
                }

                text.setAttribute("value", features[index]);
                text.setAttribute("opacity", "1");

                setTimeout(() => {
                    text.setAttribute("opacity", "0");
                    index++;
                    setTimeout(showNextFeature, 500);
                }, 2500);
            }

            // Hotspot Click Event
            hotspot.addEventListener("click", () => {
                console.log("Hotspot Clicked! Redirecting...");
                
                // Optional: Visual feedback before redirect
                hotspot.setAttribute("color", "#00ff00");
                
                setTimeout(() => {
                    window.location.href = "https://nysensepre-l5gmgl4y.manus.space";
                }, 200);
            });

            // Also add touch support for mobile specifically
            hotspot.addEventListener("touchstart", () => {
                console.log("Touch detected on hotspot");
                window.location.href = "https://nysensepre-l5gmgl4y.manus.space";
            });

        });
    </script>

</body>
</html>
